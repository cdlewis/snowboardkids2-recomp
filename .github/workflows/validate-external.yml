name: validate-external

# Temporarily disable automatic workflow runs to conserve Actions quota.
# Restore the pull_request_target trigger below when CI automation should resume.
on:
  workflow_dispatch:
#  pull_request_target:
#    types: [opened, synchronize]

jobs:
  authorize:
    if: github.repository != github.event.pull_request.head.repo.full_name
    environment:
      ${{ github.event_name == 'pull_request_target' &&
      github.event.pull_request.head.repo.full_name != github.repository &&
      'external' || 'internal' }}
    runs-on: ubuntu-latest
    steps:
      - run: echo ok

  build:
    needs: authorize
    uses: ./.github/workflows/validate.yml
    secrets:
      PRIVATE_REPO_ACCESS: ${{ secrets.PRIVATE_REPO_ACCESS }}
      BASEROM_KEY: ${{ secrets.BASEROM_KEY }}
