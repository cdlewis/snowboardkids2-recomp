name: validate

on:
  workflow_call:
    inputs:
      SDL2_VERSION:
        type: string
        required: false
        default: '2.30.3'
      N64RECOMP_COMMIT:
        type: string
        required: false
        default: '70a894aad8d3491ca0fccee1f94dae8190845686'
    secrets:
      PRIVATE_REPO_ACCESS:
        required: true
      BASEROM_KEY:
        required: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        type: [Debug, Release]
        os: [ubuntu-22.04]
    name: ubuntu-22.04 (x64, ${{ matrix.type }}, Native, AppImage)
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event.pull_request.head.sha || github.ref }}
          submodules: false

      - name: Checkout submodules
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git submodule sync --recursive
          git config submodule.snowboardkids2-recomp-syms.url "https://x-access-token:${{ secrets.PRIVATE_REPO_ACCESS }}@github.com/cdlewis/snowboardkids2-recomp-syms.git"
          git submodule update --init --recursive

      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ matrix.os }}-sk2re-ccache-${{ matrix.type }}-x64-${{ inputs.N64RECOMP_COMMIT }}

      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libsdl2-dev libgtk-3-dev lld llvm clang-15 libfuse2

          echo ::group::install SDL2
          export PATH="/usr/lib/ccache:/usr/local/opt/ccache/libexec:$PATH"
          wget https://github.com/libsdl-org/SDL/releases/download/release-${{ inputs.SDL2_VERSION }}/SDL2-${{ inputs.SDL2_VERSION }}.tar.gz
          tar -xzf SDL2-${{ inputs.SDL2_VERSION }}.tar.gz
          cd SDL2-${{ inputs.SDL2_VERSION }}
          ./configure
          make -j 10
          sudo make install
          sudo cp -av /usr/local/lib/libSDL* /lib/x86_64-linux-gnu/
          echo ::endgroup::

      - name: Checkout baserom
        uses: actions/checkout@v4
        with:
          repository: cdlewis/snowboardkids2-private
          token: ${{ secrets.PRIVATE_REPO_ACCESS }}
          path: baserom

      - name: Decrypt baserom
        run: gpg --quiet --batch --yes --decrypt --passphrase "$BASEROM_KEY" --output snowboardkids2.z64 snowboardkids2.z64.gpg
        env:
          BASEROM_KEY: ${{ secrets.BASEROM_KEY }}
        working-directory: baserom

      - name: Prepare Build
        run: cp baserom/snowboardkids2.z64 ./

      - name: Build N64Recomp and RSPRecomp
        run: |
          git clone https://github.com/Mr-Wiseguy/N64Recomp.git --recurse-submodules N64RecompSource
          cd N64RecompSource
          git checkout ${{ inputs.N64RECOMP_COMMIT }}
          git submodule update --init --recursive

          export PATH="/usr/lib/ccache:/usr/local/opt/ccache/libexec:$PATH"
          cmake -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_COMPILER_LAUNCHER=ccache -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER=g++-11 -DCMAKE_C_COMPILER=gcc-11 -DCMAKE_MAKE_PROGRAM=ninja -G Ninja -S . -B cmake-build
          cmake --build cmake-build --config Release --target N64RecompCLI -j $(nproc)
          cmake --build cmake-build --config Release --target RSPRecomp -j $(nproc)

          cp cmake-build/N64Recomp ..
          cp cmake-build/RSPRecomp ..

      - name: Run N64Recomp and RSPRecomp
        run: |
          ./N64Recomp us.toml
          ./RSPRecomp aspMain.us.toml

      - name: Build SnowboardKids2Recomp
        run: |
          export PATH="/usr/lib/ccache:/usr/local/opt/ccache/libexec:$PATH"
          cmake -DCMAKE_BUILD_TYPE=${{ matrix.type }} -DCMAKE_CXX_COMPILER_LAUNCHER=ccache -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER=clang++-15 -DCMAKE_C_COMPILER=clang-15 -DCMAKE_MAKE_PROGRAM=ninja -G Ninja -S . -B cmake-build
          cmake --build cmake-build --config ${{ matrix.type }} --target SnowboardKids2Recompiled -j $(nproc)

      - name: Prepare Archive
        run: |
          mv cmake-build/SnowboardKids2Recompiled SnowboardKids2Recompiled
          rm -rf assets/scss
          tar -czf SnowboardKids2Recompiled.tar.gz SnowboardKids2Recompiled assets/ recompcontrollerdb.txt

      - name: Archive SnowboardKids2Recomp
        uses: actions/upload-artifact@v4
        with:
          name: SnowboardKids2Recompiled-${{ runner.os }}-X64-${{ matrix.type }}
          path: SnowboardKids2Recompiled.tar.gz

      - name: Build AppImage
        run: bash .github/linux/appimage.sh

      - name: SnowboardKids2Recomp AppImage
        uses: actions/upload-artifact@v4
        with:
          name: SnowboardKids2Recompiled-AppImage-X64-${{ matrix.type }}
          path: SnowboardKids2Recompiled-*.AppImage

  build-linux-flatpak:
    runs-on: ubuntu-latest
    env:
      FLATPAK_ID: io.github.snowboardkids2recomp.snowboardkids2recomp
      FREEDESKTOP_VERSION: 25.08
      LLVM_VERSION: 20
    strategy:
      matrix:
        type: [Debug, Release]
        os: [ubuntu-latest]
    name: ${{ matrix.os }} (x64, ${{ matrix.type }}, Flatpak)
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event.pull_request.head.sha || github.ref }}
          submodules: false

      - name: Checkout submodules
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git submodule sync --recursive
          git config submodule.snowboardkids2-recomp-syms.url "https://x-access-token:${{ secrets.PRIVATE_REPO_ACCESS }}@github.com/cdlewis/snowboardkids2-recomp-syms.git"
          git submodule update --init --recursive

      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ matrix.os }}-sk2re-ccache-${{ matrix.type }}-x64-${{ inputs.N64RECOMP_COMMIT }}

      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak-builder ccache lld

      - name: Checkout baserom
        uses: actions/checkout@v4
        with:
          repository: cdlewis/snowboardkids2-private
          token: ${{ secrets.PRIVATE_REPO_ACCESS }}
          path: baserom

      - name: Decrypt baserom
        run: gpg --quiet --batch --yes --decrypt --passphrase "$BASEROM_KEY" --output snowboardkids2.z64 snowboardkids2.z64.gpg
        env:
          BASEROM_KEY: ${{ secrets.BASEROM_KEY }}
        working-directory: baserom

      - name: Prepare Build
        run: cp baserom/snowboardkids2.z64 ./

      - name: Prepare Flatpak
        run: |
          flatpak --user remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak --user install -y flathub org.freedesktop.Sdk//${{ env.FREEDESKTOP_VERSION }}
          flatpak --user install -y flathub org.freedesktop.Sdk.Extension.llvm${{ env.LLVM_VERSION }}//${{ env.FREEDESKTOP_VERSION }}

      - name: Build SnowboardKids2Recomp
        run: |
          export CCACHE_DIR=/tmp/ccache
          git config --global protocol.file.allow always
          make -C patches CC=clang LD=ld.lld
          flatpak-builder --user --force-clean --install-deps-from=flathub --repo=repo --ccache builddir ./flatpak/${{ env.FLATPAK_ID }}.json
          flatpak build-bundle repo ./${{ env.FLATPAK_ID }}.flatpak ${{ env.FLATPAK_ID }} --runtime-repo=https://flathub.org/repo/flathub.flatpakrepo

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SnowboardKids2Recompiled-Flatpak-X64-${{ matrix.type }}
          path: ./${{ env.FLATPAK_ID }}.flatpak

  build-linux-arm64:
    runs-on: ubuntu-22.04-arm
    strategy:
      matrix:
        type: [Debug, Release]
        os: [ubuntu-22.04]
    name: ubuntu-22.04 (arm64, ${{ matrix.type }}, Native, AppImage)
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event.pull_request.head.sha || github.ref }}
          submodules: false

      - name: Checkout submodules
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git submodule sync --recursive
          git config submodule.snowboardkids2-recomp-syms.url "https://x-access-token:${{ secrets.PRIVATE_REPO_ACCESS }}@github.com/cdlewis/snowboardkids2-recomp-syms.git"
          git submodule update --init --recursive

      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ matrix.os }}-sk2re-ccache-${{ matrix.type }}-arm64-${{ inputs.N64RECOMP_COMMIT }}

      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libsdl2-dev libgtk-3-dev lld llvm clang-15 libfuse2

          echo ::group::install SDL2
          export PATH="/usr/lib/ccache:/usr/local/opt/ccache/libexec:$PATH"
          wget https://github.com/libsdl-org/SDL/releases/download/release-${{ inputs.SDL2_VERSION }}/SDL2-${{ inputs.SDL2_VERSION }}.tar.gz
          tar -xzf SDL2-${{ inputs.SDL2_VERSION }}.tar.gz
          cd SDL2-${{ inputs.SDL2_VERSION }}
          ./configure
          make -j 10
          sudo make install
          sudo cp -av /usr/local/lib/libSDL* /lib/aarch64-linux-gnu/
          echo ::endgroup::

      - name: Checkout baserom
        uses: actions/checkout@v4
        with:
          repository: cdlewis/snowboardkids2-private
          token: ${{ secrets.PRIVATE_REPO_ACCESS }}
          path: baserom

      - name: Decrypt baserom
        run: gpg --quiet --batch --yes --decrypt --passphrase "$BASEROM_KEY" --output snowboardkids2.z64 snowboardkids2.z64.gpg
        env:
          BASEROM_KEY: ${{ secrets.BASEROM_KEY }}
        working-directory: baserom

      - name: Prepare Build
        run: cp baserom/snowboardkids2.z64 ./

      - name: Build N64Recomp and RSPRecomp
        run: |
          git clone https://github.com/Mr-Wiseguy/N64Recomp.git --recurse-submodules N64RecompSource
          cd N64RecompSource
          git checkout ${{ inputs.N64RECOMP_COMMIT }}
          git submodule update --init --recursive

          export PATH="/usr/lib/ccache:/usr/local/opt/ccache/libexec:$PATH"
          cmake -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_COMPILER_LAUNCHER=ccache -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER=g++-11 -DCMAKE_C_COMPILER=gcc-11 -DCMAKE_MAKE_PROGRAM=ninja -G Ninja -S . -B cmake-build
          cmake --build cmake-build --config Release --target N64RecompCLI -j $(nproc)
          cmake --build cmake-build --config Release --target RSPRecomp -j $(nproc)

          cp cmake-build/N64Recomp ..
          cp cmake-build/RSPRecomp ..

      - name: Run N64Recomp and RSPRecomp
        run: |
          ./N64Recomp us.toml
          ./RSPRecomp aspMain.us.toml

      - name: Build SnowboardKids2Recomp
        run: |
          export PATH="/usr/lib/ccache:/usr/local/opt/ccache/libexec:$PATH"
          cmake -DCMAKE_BUILD_TYPE=${{ matrix.type }} -DCMAKE_CXX_COMPILER_LAUNCHER=ccache -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER=clang++-15 -DCMAKE_C_COMPILER=clang-15 -DCMAKE_MAKE_PROGRAM=ninja -G Ninja -S . -B cmake-build
          cmake --build cmake-build --config ${{ matrix.type }} --target SnowboardKids2Recompiled -j $(nproc)

      - name: Prepare Archive
        run: |
          mv cmake-build/SnowboardKids2Recompiled SnowboardKids2Recompiled
          rm -rf assets/scss
          tar -czf SnowboardKids2Recompiled.tar.gz SnowboardKids2Recompiled assets/ recompcontrollerdb.txt

      - name: Archive SnowboardKids2Recomp
        uses: actions/upload-artifact@v4
        with:
          name: SnowboardKids2Recompiled-${{ runner.os }}-ARM64-${{ matrix.type }}
          path: SnowboardKids2Recompiled.tar.gz

      - name: Build AppImage
        run: bash .github/linux/appimage.sh

      - name: SnowboardKids2Recomp AppImage
        uses: actions/upload-artifact@v4
        with:
          name: SnowboardKids2Recompiled-AppImage-ARM64-${{ matrix.type }}
          path: SnowboardKids2Recompiled-*.AppImage

  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        type: [Debug, RelWithDebInfo]
    name: windows (${{ matrix.type }})
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event.pull_request.head.sha || github.ref }}
          submodules: false

      - name: Checkout submodules
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git submodule sync --recursive
          git config submodule.snowboardkids2-recomp-syms.url "https://x-access-token:${{ secrets.PRIVATE_REPO_ACCESS }}@github.com/cdlewis/snowboardkids2-recomp-syms.git"
          git submodule update --init --recursive

      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ runner.os }}-sk2re-ccache-${{ matrix.type }}

      - name: Install Windows Dependencies
        run: |
          choco install ninja
          Remove-Item -Path "C:\ProgramData\Chocolatey\bin\ccache.exe" -Force -ErrorAction SilentlyContinue

      - name: Download portable LLVM
        run: |
          $ProgressPreference = 'SilentlyContinue'
          Invoke-WebRequest -Uri "https://github.com/llvm/llvm-project/releases/download/llvmorg-19.1.3/LLVM-19.1.3-Windows-X64.tar.xz" -OutFile "LLVM.tar.xz"
          New-Item -ItemType Directory -Path portable-llvm > $null
          7z x LLVM.tar.xz
          7z x LLVM.tar -oportable-llvm

      - name: Configure Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1

      - name: Checkout baserom
        uses: actions/checkout@v4
        with:
          repository: cdlewis/snowboardkids2-private
          token: ${{ secrets.PRIVATE_REPO_ACCESS }}
          path: baserom

      - name: Decrypt baserom
        run: gpg --quiet --batch --yes --decrypt --passphrase "$env:BASEROM_KEY" --output snowboardkids2.z64 snowboardkids2.z64.gpg
        env:
          BASEROM_KEY: ${{ secrets.BASEROM_KEY }}
        working-directory: baserom

      - name: Prepare Build
        run: Copy-Item -Path ".\baserom\snowboardkids2.z64" -Destination ".\snowboardkids2.z64"

      - name: Build N64Recomp and RSPRecomp
        run: |
          git clone https://github.com/Mr-Wiseguy/N64Recomp.git --recurse-submodules N64RecompSource
          cd N64RecompSource
          git checkout ${{ inputs.N64RECOMP_COMMIT }}
          git submodule update --init --recursive

          $env:PATH="$env:USERPROFILE/.cargo/bin;$env:PATH"
          $cpuCores = (Get-CimInstance -ClassName Win32_Processor).NumberOfLogicalProcessors

          cmake -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_COMPILER_LAUNCHER=ccache -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_MAKE_PROGRAM=ninja -G Ninja -S . -B cmake-build
          cmake --build cmake-build --config Release --target N64RecompCLI -j $cpuCores
          cmake --build cmake-build --config Release --target RSPRecomp -j $cpuCores

          cp cmake-build/N64Recomp.exe ..
          cp cmake-build/RSPRecomp.exe ..

      - name: Run N64Recomp and RSPRecomp
        run: |
          ./N64Recomp.exe us.toml
          ./RSPRecomp.exe aspMain.us.toml

      - name: Build SnowboardKids2Recomp
        run: |
          $env:PATH="$env:USERPROFILE/.cargo/bin;$env:PATH"
          $cpuCores = (Get-CimInstance -ClassName Win32_Processor).NumberOfLogicalProcessors

          $env:PATH = ($env:PATH -split ';' | Where-Object { $_ -ne 'C:\Program Files\LLVM\bin' }) -join ';'

          cmake -DCMAKE_BUILD_TYPE=${{ matrix.type }} -DCMAKE_CXX_COMPILER_LAUNCHER=ccache -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER=clang-cl -DCMAKE_C_COMPILER=clang-cl -DCMAKE_MAKE_PROGRAM=ninja -DPATCHES_C_COMPILER="..\portable-llvm\LLVM-19.1.3-Windows-X64\bin\clang" -DPATCHES_LD="..\portable-llvm\LLVM-19.1.3-Windows-X64\bin\ld.lld" -G Ninja -S . -B cmake-build -DCMAKE_CXX_FLAGS="-Xclang -fexceptions -Xclang -fcxx-exceptions"
          cmake --build cmake-build --config ${{ matrix.type }} --target SnowboardKids2Recompiled -j $cpuCores
        env:
          SDL2_VERSION: ${{ inputs.SDL2_VERSION }}

      - name: Prepare Archive
        run: |
          Move-Item -Path "cmake-build/SnowboardKids2Recompiled.exe" -Destination "SnowboardKids2Recompiled.exe"
          Move-Item -Path "cmake-build/dxcompiler.dll" -Destination "dxcompiler.dll"
          Move-Item -Path "cmake-build/dxil.dll" -Destination "dxil.dll"
          Move-Item -Path "cmake-build/SDL2.dll" -Destination "SDL2.dll"
          Move-Item -Path "cmake-build/SnowboardKids2Recompiled.pdb" -Destination "SnowboardKids2Recompiled.pdb"
          Remove-Item -Path "assets/scss" -Recurse -Force

      - name: Archive SnowboardKids2Recomp
        uses: actions/upload-artifact@v4
        with:
          name: SnowboardKids2Recompiled-${{ runner.os }}-${{ matrix.type }}
          path: |
            SnowboardKids2Recompiled.exe
            dxcompiler.dll
            dxil.dll
            SDL2.dll
            assets/
            recompcontrollerdb.txt

      - name: Archive Debug Files
        uses: actions/upload-artifact@v4
        with:
          name: SnowboardKids2Recompiled-PDB-${{ matrix.type }}
          path: SnowboardKids2Recompiled.pdb

  build-macos:
    runs-on: macos-14
    strategy:
      matrix:
        type: [Debug, Release]
    name: macos (x64, arm64, ${{ matrix.type }})
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event.pull_request.head.sha || github.ref }}
          submodules: false

      - name: Checkout submodules
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git submodule sync --recursive
          git config submodule.snowboardkids2-recomp-syms.url "https://x-access-token:${{ secrets.PRIVATE_REPO_ACCESS }}@github.com/cdlewis/snowboardkids2-recomp-syms.git"
          git submodule update --init --recursive

      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ runner.os }}-sk2re-ccache-${{ matrix.type }}

      - name: Homebrew Setup
        run: |
          brew install ninja
          brew uninstall --ignore-dependencies libpng freetype

      - name: MacPorts Setup
        uses: melusina-org/setup-macports@v1
        id: macports
        with:
          parameters: .github/macos/macports.yaml

      - name: Checkout baserom
        uses: actions/checkout@v4
        with:
          repository: cdlewis/snowboardkids2-private
          token: ${{ secrets.PRIVATE_REPO_ACCESS }}
          path: baserom

      - name: Decrypt baserom
        run: gpg --quiet --batch --yes --decrypt --passphrase "$BASEROM_KEY" --output snowboardkids2.z64 snowboardkids2.z64.gpg
        env:
          BASEROM_KEY: ${{ secrets.BASEROM_KEY }}
        working-directory: baserom

      - name: Prepare Build
        run: cp baserom/snowboardkids2.z64 ./

      - name: Build N64Recomp and RSPRecomp
        run: |
          git clone https://github.com/Mr-Wiseguy/N64Recomp.git --recurse-submodules N64RecompSource
          cd N64RecompSource
          git checkout ${{ inputs.N64RECOMP_COMMIT }}
          git submodule update --init --recursive

          export PATH="/usr/lib/ccache:/usr/local/opt/ccache/libexec:$PATH"
          cmake -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_COMPILER_LAUNCHER=ccache -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_MAKE_PROGRAM=ninja -G Ninja -S . -B cmake-build
          cmake --build cmake-build --config Release --target N64Recomp -j $(sysctl -n hw.ncpu)
          cmake --build cmake-build --config Release --target RSPRecomp -j $(sysctl -n hw.ncpu)

          cp cmake-build/N64Recomp ..
          cp cmake-build/RSPRecomp ..

      - name: Run N64Recomp and RSPRecomp
        run: |
          ./N64Recomp us.toml
          ./RSPRecomp aspMain.us.toml

      - name: Build SnowboardKids2Recomp
        run: |
          export PATH="/usr/lib/ccache:/usr/local/opt/ccache/libexec:$PATH"
          cmake -DCMAKE_BUILD_TYPE=${{ matrix.type }} -DCMAKE_CXX_COMPILER_LAUNCHER=ccache -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_MAKE_PROGRAM=ninja -G Ninja -S . -B cmake-build \
          -DPATCHES_LD=/opt/local/bin/ld.lld-mp-18 -DCMAKE_AR=/opt/local/bin/llvm-ar-mp-18 -DPATCHES_C_COMPILER=/opt/local/bin/clang-mp-18 \
          -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64"
          cmake --build cmake-build --config ${{ matrix.type }} --target SnowboardKids2Recompiled -j $(sysctl -n hw.ncpu)

      - name: Prepare Archive
        run: |
          mv cmake-build/SnowboardKids2Recompiled.app SnowboardKids2Recompiled.app
          zip -r -y SnowboardKids2Recompiled.zip SnowboardKids2Recompiled.app

      - name: Archive SnowboardKids2Recomp
        uses: actions/upload-artifact@v4
        with:
          name: SnowboardKids2Recompiled-${{ runner.os }}-${{ matrix.type }}
          path: SnowboardKids2Recompiled.zip
