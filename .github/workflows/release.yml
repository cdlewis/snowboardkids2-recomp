name: release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, e.g. v0.1.0"
        required: true
        type: string
      title:
        description: "Release title"
        required: true
        type: string
      notes:
        description: "Release notes"
        required: false
        type: string
      draft:
        description: "Create as a draft release"
        required: true
        default: true
        type: boolean
      prerelease:
        description: "Mark as a prerelease"
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  actions: read

jobs:
  build:
    uses: ./.github/workflows/validate.yml
    with:
      BUILD_TYPES: '["Release"]'
      WINDOWS_BUILD_TYPES: '["RelWithDebInfo"]'
      GAME_VERSION: ${{ inputs.tag }}
    secrets: inherit

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare Release Assets
        run: |
          mkdir -p release-assets

          find artifacts -mindepth 1 -maxdepth 1 -type d -print0 | while IFS= read -r -d '' artifact_dir; do
            artifact_name="$(basename "$artifact_dir")"
            file_count="$(find "$artifact_dir" -type f | wc -l)"

            if [ "$file_count" -eq 1 ]; then
              source_file="$(find "$artifact_dir" -type f | head -n 1)"
              source_base="$(basename "$source_file")"

              case "$source_base" in
                *.tar.gz) asset_name="${artifact_name}.tar.gz" ;;
                *.AppImage) asset_name="${artifact_name}.AppImage" ;;
                *.flatpak) asset_name="${artifact_name}.flatpak" ;;
                *.zip) asset_name="${artifact_name}.zip" ;;
                *.pdb) asset_name="${artifact_name}.pdb" ;;
                *) asset_name="${artifact_name}-${source_base}" ;;
              esac

              cp "$source_file" "release-assets/$asset_name"
            else
              (cd "$artifact_dir" && zip -r "../../release-assets/${artifact_name}.zip" .)
            fi
          done

          ls -la release-assets

      - name: Create Release Notes File
        env:
          RELEASE_NOTES: ${{ inputs.notes }}
        run: |
          if [ -n "$RELEASE_NOTES" ]; then
            printf '%s\n' "$RELEASE_NOTES" > release-notes.md
          else
            printf 'Release %s\n' "${{ inputs.tag }}" > release-notes.md
          fi

      - name: Create Release Tag
        env:
          RELEASE_TAG: ${{ inputs.tag }}
          RELEASE_TITLE: ${{ inputs.title }}
          TARGET_SHA: ${{ github.sha }}
        run: |
          git check-ref-format "refs/tags/$RELEASE_TAG"
          git fetch --tags origin

          if git rev-parse --verify --quiet "refs/tags/$RELEASE_TAG"; then
            existing_target="$(git rev-list -n 1 "$RELEASE_TAG")"
            if [ "$existing_target" != "$TARGET_SHA" ]; then
              printf 'Tag %s already points at %s, not %s\n' "$RELEASE_TAG" "$existing_target" "$TARGET_SHA" >&2
              exit 1
            fi

            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$RELEASE_TAG" "$TARGET_SHA" -m "$RELEASE_TITLE"
          git push origin "refs/tags/$RELEASE_TAG"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          DRAFT_FLAG: ${{ inputs.draft && '--draft' || '' }}
          PRERELEASE_FLAG: ${{ inputs.prerelease && '--prerelease' || '' }}
        run: |
          gh release create "${{ inputs.tag }}" release-assets/* \
            --title "${{ inputs.title }}" \
            --target "${{ github.sha }}" \
            --notes-file release-notes.md \
            $DRAFT_FLAG \
            $PRERELEASE_FLAG
